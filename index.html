<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="d-flex">
      <div class="sidebar collapsed" id="sidebar">
        <button id="toggleBtn" class="btn btn-sm btn-light">☰</button>
        <i class="ri-dashboard-line"></i>
        <i class="ri-group-line"></i>
        <i class="ri-bar-chart-line"></i>
        <i class="ri-file-text-line"></i>
        <i class="ri-settings-3-line"></i>
      </div>

      <div class="main flex-grow-1">
        <div
          class="topbar d-flex justify-content-between align-items-center px-3"
        >
          <div class="d-flex align-items-center gap-3">
            <img src="./assets/img/logo.png" alt="Logo" />
            <h6 class="m-0">Employee Self Service</h6>
          </div>
          <div
            style="color: #0f4f92"
            class="d-flex justify-content-between align-items-center gap-2"
          >
            <div>Welcome Employee</div>
            <div><i class="ri-attachment-2"></i></div>
            <div><i class="ri-info-card-fill fs-3"></i></div>
          </div>
        </div>

        <div class="container-fluid p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div style="color: #0f4f92">Dashboard</div>
            <div>
              <select class="form-select form-select-sm w-auto custom-select">
                <option>2026-2025</option>
                <option>2026-2025</option>
                <option>2026-2025</option>
                <option>2026-2025</option>
              </select>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <h4>Hello kamlesh,</h4>
            <button class="btn" style="padding: 4px 10px; font-size: 12px">
              Create +
            </button>
          </div>

          <!-- Main  -->
          <div class="row mt-3 d-flex align-items-stretch">
            <!-- LEFT -->
            <div class="col-lg-9 d-flex flex-column">
              <!-- STATS -->
              <div class="row g-3">
                <div class="card-1-icon col-6 col-md-3">
                  <div
                    class="card rounded-4 shadow-sm border-0 py-4 px-3 d-flex flex-column gap-1"
                  >
                    <div class="text-primary rounded mb-2">
                      <i
                        class="ri-calendar-event-line fs-5 bg-success-subtle p-2 rounded-2 card-1-icon"
                      ></i>
                    </div>
                    <div class="text-muted large">Today's Meeting</div>
                    <div class="fw-bold card-1-icon card-num">12</div>
                  </div>
                </div>

                <div class="col-6 col-md-3">
                  <div
                    class="card rounded-4 shadow-sm border-0 px-3 py-4 d-flex flex-column gap-1"
                  >
                    <div class="text-success rounded mb-1">
                      <i
                        class="ri-task-line fs-5 p-2 rounded-2 card-2-icon"
                      ></i>
                    </div>
                    <div class="text-muted large">Today's Task</div>
                    <div class="fw-bold card-num" id="card-2-num">12</div>
                  </div>
                </div>

                <div class="col-6 col-md-3">
                  <div
                    class="card rounded-4 shadow-sm border-0 px-3 py-4 d-flex flex-column gap-1"
                  >
                    <div class="text-warning rounded mb-1">
                      <i
                        class="ri-time-line fs-5 p-2 rounded-2 card-3-icon"
                      ></i>
                    </div>
                    <div class="text-muted large">Total Pending Task</div>
                    <div class="fw-bold text-warning card-num" id="card-3-num">
                      12
                    </div>
                  </div>
                </div>

                <div class="col-6 col-md-3">
                  <div
                    class="card rounded-4 shadow-sm border-0 px-3 py-4 d-flex flex-column gap-1"
                  >
                    <div class="text-info rounded mb-1">
                      <i
                        class="ri-check-double-line fs-5 p-2 rounded-2 card-4-icon"
                      ></i>
                    </div>
                    <div class="text-muted large">Completed Task</div>
                    <div class="fw-bold card-num" id="card-4-num">12</div>
                  </div>
                </div>
              </div>

              <!-- BELOW STATS -->
              <div class="row mt-1 g-3 align-items-stretch">
                <!-- TO DO -->
                <div class="col-md-6 d-flex">
                  <div
                    class="card border-0 shadow-sm p-3 rounded-4 w-100 h-100 d-flex flex-column"
                  >
                    <div
                      class="d-flex justify-content-between align-items-center"
                    >
                      <div class="events-head">To Do List</div>
                      <div class="d-flex align-items-center gap-2">
                        <div class="d-flex align-items-center gap-2">
                          <select
                            class="form-select form-select-sm w-auto custom-select"
                          >
                            <option>Today</option>
                            <option>All</option>
                            <option>Pending</option>
                            <option>Completed</option>
                          </select>
                          <button class="btn btn-sm btn-primary">
                            <i class="ri-add-line"></i>
                          </button>
                        </div>
                      </div>
                    </div>

                    <div
                      class="todo mt-3 d-flex flex-column gap-2"
                      id="todoList"
                    ></div>
                  </div>
                </div>

                <!-- MEETINGS -->
                <div class="col-md-6 d-flex">
                  <div
                    class="card border-0 p-3 rounded-4 shadow-sm w-100 h-100 d-flex flex-column"
                  >
                    <div
                      class="d-flex justify-content-between align-items-center"
                    >
                      <div class="events-head">Meetings</div>
                      <div class="d-flex align-items-center gap-2">
                        <div class="d-flex align-items-center gap-2">
                          <select
                            class="form-select form-select-sm w-auto custom-select"
                          >
                            <option>Today</option>
                            <option>All</option>
                            <option>Pending</option>
                            <option>Completed</option>
                          </select>
                          <button class="btn btn-sm btn-primary">
                            <i class="ri-add-line"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                    <div
                      id="meetingList"
                      class="d-flex flex-column gap-2 mt-3"
                    ></div>
                  </div>
                </div>
              </div>

              <div class="row mt-1 g-3 align-items-stretch">
                <!-- Ongoing Projects -->
                <div class="col-md-6 d-flex">
                  <div
                    class="card border-0 shadow-sm rounded-4 p-3 w-100 h-100 d-flex flex-column"
                  >
                    <div class="events-head mb-3">Ongoing Projects</div>
                    <div
                      id="projectList"
                      class="d-flex flex-column gap-3"
                    ></div>
                  </div>
                </div>
                <!-- Task Review -->
                <div class="col-md-6 d-flex">
                  <div
                    class="card border-0 p-3 rounded-4 shadow-sm w-100 h-100 d-flex flex-column"
                  >
                    <div class="events-head">Task In Review</div>
                    <div
                      id="reviewList"
                      class="d-flex flex-column gap-2 mt-3"
                    ></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-3 d-flex flex-column mt-3 mt-lg-0">
              <div class="card border-0 p-3 rounded-4 shadow-sm">
                <div
                  class="d-flex justify-content-between align-items-center mb-3"
                >
                  <div class="events-head">Upcoming Events</div>

                  <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-light" id="prevEvent">
                      <i class="ri-arrow-left-s-line"></i>
                    </button>

                    <button class="btn btn-sm btn-primary" id="nextEvent">
                      <i class="ri-arrow-right-s-line"></i>
                    </button>
                  </div>
                </div>
                <div
                  id="eventsScroll"
                  class="d-flex gap-3 overflow-hidden"
                ></div>
              </div>

              <div class="card border-0 shadow-sm rounded-4 p-3 mt-4">
                <div
                  class="d-flex justify-content-between align-items-center mb-2"
                >
                  <div class="events-head mb-2">
                    Feeds
                    <span class="badge bg-light text-dark ms-1" id="feedCount"
                      >0</span
                    >
                  </div>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                  <div
                    class="btn-group p-1 bg-dark-subtle rounded-pill"
                    role="group"
                  >
                    <input
                      type="radio"
                      class="btn-check"
                      name="feedFilter"
                      id="all"
                      checked
                    />
                    <label
                      class="btn btn-sm rounded-pill px-3 toggle-btn-title"
                      for="all"
                      >View All</label
                    >
                    <input
                      type="radio"
                      class="btn-check"
                      name="feedFilter"
                      id="unread"
                    />
                    <label
                      class="btn btn-sm rounded-pill px-3 toggle-btn-title"
                      for="unread"
                      >Unread</label
                    >
                  </div>
                  <div id="markAll" style="cursor: pointer">
                    Mark all as read
                  </div>
                </div>
                <div
                  id="feedList"
                  class="d-flex flex-column gap-2"
                  style="max-height: 600px; overflow-y: auto"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
